{% extends "base.html" %}
{% block title %}编辑会员{% endblock %}
{% block body %}
<main class="center-page">
  <section class="form-card wide-card">
    <a class="back-link" href="{{ url_for('admin_dashboard') }}">← 返回会员管理</a>
    <h1>编辑会员</h1>
    {% for category, message in get_flashed_messages(with_categories=true) %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
    <form method="post" class="stack-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-grid"><label>会员名称<input name="name" value="{{ vehicle.name }}" maxlength="80" required></label><label>编号<input name="code" value="{{ vehicle.code }}" maxlength="20" required></label></div>
      <label>分类<select name="category" required>{% for category in categories %}<option value="{{ category.name }}" {{ 'selected' if category.name == vehicle.category else '' }}>{{ category.name }}</option>{% endfor %}</select></label>
      <label>登录账号（可选）<input name="account" value="{{ vehicle.account }}" maxlength="160" autocomplete="off"></label>
      <label>到期时间（可选）<input type="date" name="expires_at" value="{{ vehicle.expires_at or '' }}"></label>
      <label>备注（可选）<textarea name="notes" rows="4" maxlength="1000">{{ vehicle.notes }}</textarea></label>
      <label>更换2FA密钥<input name="secret" placeholder="不修改请留空" autocomplete="off"></label>
      <p class="hint">现有密钥不会显示。输入新密钥后才会覆盖。</p>
      <button class="btn primary wide" type="submit">保存修改</button>
    </form>
  </section>
</main>
{% endblock %}
